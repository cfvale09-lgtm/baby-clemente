<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍼 Regalos para Baby Clemente</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f8f9fa; color: #2c3e50; }
  .header { text-align: center; padding: 3rem 1.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
  .header h1 { font-size: 36px; margin-bottom: 0.5rem; }
  .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
  .controls { display: flex; gap: 12px; margin-bottom: 2rem; }
  .controls input { flex: 1; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
  .controls button { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 2rem; }
  .stat-card { background: white; padding: 1.5rem; border-radius: 12px; text-align: center; }
  .stat-number { font-size: 32px; font-weight: 700; color: #667eea; }
  .gifts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
  .gift-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.5rem; }
  .gift-name { font-size: 16px; font-weight: 600; margin-bottom: 0.5rem; }
  .btn-claim { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 1rem; }
</style>
</head>
<body>
<div class="header">
  <h1>🍼 Regalos para Baby Clemente</h1>
  <p>Baby Brunch - Septiembre 2026</p>
</div>
<div class="container">
  <div class="controls">
    <input type="text" id="nameInput" placeholder="Tu nombre">
    <button onclick="alert('¡Página lista!')">Ver regalos</button>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-number">13</div><div>Regalos totales</div></div>
    <div class="stat-card"><div class="stat-number" id="claimed">0</div><div>Comprometidos</div></div>
    <div class="stat-card"><div class="stat-number" id="available">13</div><div>Disponibles</div></div>
  </div>
  <div class="gifts-grid" id="giftsContainer"></div>
</div>
<script>
const gifts = [
  { name: "Nido Colecho Reversible Océano", store: "Olivia y Sam", url: "https://www.oliviaysam.com/nido-colecho-reversible-oceano" },
  { name: "Saco de dormir Guldvaevare", store: "IKEA", url: "https://www.ikea.com/cl/es/p/guldvaevare-saco-de-dormir-beige-ocre-90588543/" },
  { name: "Saco de dormir Tencel Hojas Verdes", store: "Rosen", url: "https://www.rosen.cl/babyrosen/saco-de-dormir-tencel-hojas-verdes-0-2-meses.html" },
  { name: "Termómetro Ambiental", store: "Mamás Mateas", url: "https://mamasmateas.com/products/termometro-ambiental" },
  { name: "Toalla con Capucha (Carter's)", store: "Falabella", url: "https://www.falabella.com/falabella-cl/product/17450181/" },
  { name: "Toalla de Bebé con Capucha Amarilla", store: "IKEA", url: "https://www.ikea.com/cl/es/p/groenfink-toalla-de-bebe-con-capucha-amarillo-70572369/" },
  { name: "Mamadera Softouch 150ml", store: "Mamás Mateas", url: "https://mamasmateas.com/products/mamadera-softouch-boca-ancha-pp" },
  { name: "Mamadera Softouch 240ml", store: "Mamás Mateas", url: "https://mamasmateas.com/products/mamadera-softouch-boca-ancha-pp" },
  { name: "Mamadera Softouch 320ml", store: "Mamás Mateas", url: "https://mamasmateas.com/products/mamadera-softouch-boca-ancha-pp" },
  { name: "Cepillo de Limpieza Silicona", store: "Mamás Mateas", url: "https://mamasmateas.com/products/cepillo-de-limpieza-de-silicona-gris" },
  { name: "Calentador de Mamaderas", store: "Mamás Mateas", url: "https://mamasmateas.com/products/calentador-de-mamaderas" },
  { name: "Set Lima Uñas Eléctrico", store: "Falabella", url: "https://www.falabella.com/falabella-cl/product/141799642/" },
  { name: "Cepillo Peineta", store: "Mamás Mateas", url: "https://mamasmateas.com/products/cepillo-peineta" }
];

let claimedGifts = JSON.parse(localStorage.getItem('clemGifts')) || {};

function renderGifts() {
  const container = document.getElementById('giftsContainer');
  container.innerHTML = '';
  gifts.forEach((gift, i) => {
    const isClaimed = claimedGifts[i];
    const card = document.createElement('div');
    card.className = 'gift-card';
    card.innerHTML = `
      <div class="gift-name">${gift.name}</div>
      <div style="font-size: 13px; color: #7f8c8d; margin-bottom: 1rem;">📍 ${gift.store}</div>
      <a href="${gift.url}" target="_blank" style="color: #667eea; text-decoration: none;">Ver producto →</a>
      <div style="font-size: 12px; color: #95a5a6; margin-top: 1rem; margin-bottom: 0.5rem;">${isClaimed ? `Reservado por: <strong>${isClaimed}</strong>` : 'Disponible'}</div>
      <button class="btn-claim" onclick="claim(${i})">${isClaimed ? 'Liberar' : 'Yo compro esto'}</button>
    `;
    container.appendChild(card);
  });
}

function claim(id) {
  const name = document.getElementById('nameInput').value.trim();
  if (!name && !claimedGifts[id]) {
    alert('Ingresa tu nombre primero');
    return;
  }
  if (claimedGifts[id]) {
    delete claimedGifts[id];
  } else {
    claimedGifts[id] = name;
  }
  localStorage.setItem('clemGifts', JSON.stringify(claimedGifts));
  renderGifts();
  document.getElementById('claimed').textContent = Object.keys(claimedGifts).length;
  document.getElementById('available').textContent = gifts.length - Object.keys(claimedGifts).length;
}

renderGifts();
</script>
</body>
</html>
